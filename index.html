```html
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Kelas Harian</title>

    <style>
        /* Mengatur tampilan body */
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            margin: 0;
            padding: 0;
        }

        /* Container utama */
        .container {
            width: 400px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
        }

        /* Judul */
        h1 {
            text-align: center;
            color: darkgreen;
        }

        /* Label input */
        label {
            font-weight: bold;
        }

        /* Input */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        /* Tombol */
        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        /* Efek hover tombol */
        button:hover {
            background-color: darkgreen;
        }

        /* Box output */
        .output {
            margin-top: 20px;
            padding: 15px;
            background-color: #e7ffe7;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Container utama -->
    <div class="container">

        <!-- Judul aplikasi -->
        <h1>Aplikasi Absensi Kelas Harian</h1>

        <!-- Form absensi -->
        <form id="formAbsensi">

            <!-- Input nama siswa -->
            <label>Nama Siswa</label>
            <input type="text" id="nama" placeholder="Masukkan nama siswa" required>

            <!-- Input kelas -->
            <label>Kelas</label>
            <input type="text" id="kelas" placeholder="Masukkan kelas" required>

            <!-- Input nomor absen -->
            <label>Nomor Absen</label>
            <input type="number" id="absen" placeholder="Masukkan nomor absen" required>

            <!-- Input waktu absen -->
            <label>Waktu Absen</label>
            <input type="text" id="waktu" placeholder="Masukkan waktu absen" required>

            <!-- Tombol kirim -->
            <button type="submit">Kirim Absensi</button>
        </form>

        <!-- Tempat output -->
        <div id="output" class="output"></div>

    </div>

    <script>
        // Mengambil form absensi
        const form = document.getElementById("formAbsensi");

        // Event ketika tombol submit ditekan
        form.addEventListener("submit", function(event) {

            // Mencegah halaman refresh otomatis
            event.preventDefault();

            // Mengambil data dari input
            const nama = document.getElementById("nama").value;
            const kelas = document.getElementById("kelas").value;
            const absen = document.getElementById("absen").value;
            const waktu = document.getElementById("waktu").value;

            // Mengambil elemen output
            const output = document.getElementById("output");

            // Menampilkan hasil absensi
            output.innerHTML = `
                <h3>Rekap Absensi</h3>
                <p><b>Nama Siswa:</b> ${nama}</p>
                <p><b>Kelas:</b> ${kelas}</p>
                <p><b>Nomor Absen:</b> ${absen}</p>
                <p><b>Waktu Absen:</b> ${waktu}</p>
                <hr>
                <p><b>Absensi anda sudah kami terima, kami akan mengirimkan petugas terkait.</b></p>
            `;

            // Menampilkan output
            output.style.display = "block";
        });
    </script>

</body>
</html>
