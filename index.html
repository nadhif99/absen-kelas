<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Absensi Kelas Harian</title>

    <style>
        /* Background halaman dengan gambar pemandangan hijau */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;

            /* Background gambar */
            background: 
                linear-gradient(rgba(0, 100, 0, 0.5), rgba(0, 100, 0, 0.5)),
                url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1600&auto=format&fit=crop');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            /* Posisi tengah */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Container utama */
        .container {
            width: 420px;
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            box-shadow: 0px 5px 20px rgba(0,0,0,0.4);
            animation: muncul 1s ease;
        }

        /* Animasi */
        @keyframes muncul {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Judul */
        h1 {
            text-align: center;
            color: darkgreen;
        }

        /* Label */
        label {
            font-weight: bold;
            color: #333;
        }

        /* Input */
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 2px solid green;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* Efek input */
        input:focus {
            outline: none;
            box-shadow: 0px 0px 8px green;
        }

        /* Tombol */
        button {
            width: 100%;
            padding: 12px;
            background: green;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        /* Hover tombol */
        button:hover {
            background: darkgreen;
            transform: scale(1.02);
        }

        /* Output */
        .output {
            margin-top: 20px;
            background: #e8ffe8;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid green;
            display: none;
        }
    </style>
</head>
<body>

    <!-- Container utama -->
    <div class="container">

        <!-- Judul -->
        <h1>🌿 Absensi Kelas Harian</h1>

        <!-- Form -->
        <form id="formAbsensi">

            <!-- Input nama -->
            <label>Nama Siswa</label>
            <input type="text" id="nama" placeholder="Masukkan nama siswa" required>

            <!-- Input kelas -->
            <label>Kelas</label>
            <input type="text" id="kelas" placeholder="Masukkan kelas" required>

            <!-- Input nomor absen -->
            <label>Nomor Absen</label>
            <input type="number" id="absen" placeholder="Masukkan nomor absen" required>

            <!-- Input waktu -->
            <label>Waktu Absen</label>
            <input type="text" id="waktu" placeholder="Contoh: 07.00 WIB" required>

            <!-- Tombol -->
            <button type="submit">Kirim Absensi</button>
        </form>

        <!-- Hasil output -->
        <div id="output" class="output"></div>

    </div>

    <script>
        // Mengambil form
        const form = document.getElementById("formAbsensi");

        // Event submit
        form.addEventListener("submit", function(event) {

            // Mencegah reload
            event.preventDefault();

            // Mengambil data input
            const nama = document.getElementById("nama").value;
            const kelas = document.getElementById("kelas").value;
            const absen = document.getElementById("absen").value;
            const waktu = document.getElementById("waktu").value;

            // Mengambil output
            const output = document.getElementById("output");

            // Menampilkan hasil
            output.innerHTML = `
                <h3>📋 Rekap Absensi</h3>

                <p><b>Nama Siswa:</b> ${nama}</p>
                <p><b>Kelas:</b> ${kelas}</p>
                <p><b>Nomor Absen:</b> ${absen}</p>
                <p><b>Waktu Absen:</b> ${waktu}</p>

                <hr>

                <p>
                ✅ <b>Absensi anda sudah kami terima,
                kami akan mengirimkan petugas terkait.</b>
                </p>
            `;

            // Menampilkan output
            output.style.display = "block";
        });
    </script>

</body>
</html>
